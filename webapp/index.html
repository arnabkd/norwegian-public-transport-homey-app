<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entur Testbed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e3e8;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #fff;
    }
    h1 span { color: #6e7681; font-weight: 400; }

    .search-box {
      position: relative;
      max-width: 500px;
    }
    #search {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e3e8;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: #58a6ff; }
    #search::placeholder { color: #484f58; }

    #results {
      list-style: none;
      max-width: 500px;
      margin-top: 0.25rem;
      border-radius: 8px;
      overflow: hidden;
    }
    #results li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      transition: background 0.1s;
    }
    #results li:hover { background: #1c2330; }
    .stop-icon { font-size: 1.1rem; flex-shrink: 0; }
    .stop-name { font-weight: 500; }
    .stop-locality { color: #6e7681; font-size: 0.85rem; margin-left: auto; }
    .stop-id { display: none; }

    .selected-stop {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      max-width: 500px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .selected-stop .stop-title { font-weight: 600; font-size: 1.05rem; }
    .selected-stop .stop-id-display { color: #6e7681; font-size: 0.8rem; font-family: monospace; }
    .selected-stop-actions { display: flex; align-items: center; gap: 0.6rem; }
    .hidden { display: none !important; }

    #clear-btn {
      background: none;
      border: 1px solid #30363d;
      color: #6e7681;
      border-radius: 6px;
      padding: 0.35rem 0.65rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: border-color 0.15s, color 0.15s;
    }
    #clear-btn:hover { border-color: #f85149; color: #f85149; }

    #departures {
      margin-top: 1rem;
      max-width: 500px;
    }

    .departure-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      font-size: 1rem;
    }
    .departure-row:first-child { border-radius: 8px 8px 0 0; }
    .departure-row:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
    .departure-row:only-child { border-radius: 8px; }

    .dep-icon { font-size: 1.2rem; flex-shrink: 0; width: 1.5rem; text-align: center; }
    .dep-line {
      font-weight: 700;
      min-width: 2.5rem;
      text-align: center;
      background: #30363d;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .dep-dest { flex: 1; }
    .dep-time {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 3.5rem;
      text-align: right;
    }
    .dep-now { color: #3fb950; }
    .dep-rt { width: 1.2rem; text-align: center; font-size: 0.8rem; }

    #mode-filters {
      margin-top: 0.75rem;
      max-width: 500px;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .mode-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.75rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      color: #6e7681;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, opacity 0.15s;
      opacity: 0.5;
    }
    .mode-btn.active {
      border-color: #58a6ff;
      color: #e1e3e8;
      opacity: 1;
    }
    .mode-btn:hover { border-color: #58a6ff; }
    .mode-btn .mode-icon { font-size: 1rem; }

    .settings-bar {
      margin-top: 1rem;
      max-width: 500px;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .setting {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: #6e7681;
    }
    .setting label { white-space: nowrap; }
    .setting input {
      width: 3.5rem;
      padding: 0.3rem 0.4rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e1e3e8;
      font-size: 0.8rem;
      text-align: center;
      outline: none;
    }
    .setting input:focus { border-color: #58a6ff; }
    .setting .unit { color: #484f58; }

    #refresh-indicator {
      display: flex;
      align-items: center;
    }
    .refresh-ring {
      transform: rotate(-90deg);
    }
    .refresh-ring-bg {
      fill: none;
      stroke: #21262d;
      stroke-width: 3;
    }
    .refresh-ring-fg {
      fill: none;
      stroke: #58a6ff;
      stroke-width: 3;
      stroke-dasharray: 50.27;
      stroke-dashoffset: 50.27;
      stroke-linecap: round;
    }
    @keyframes refresh-countdown {
      from { stroke-dashoffset: 50.27; }
      to { stroke-dashoffset: 0; }
    }

    .no-departures, .error {
      padding: 1rem;
      text-align: center;
      color: #6e7681;
      background: #161b22;
      border-radius: 8px;
    }
    .error { color: #f85149; }
  </style>
</head>
<body>
  <h1>Entur Testbed <span>— departure monitor</span></h1>

  <div class="settings-bar">
    <div class="setting">
      <label for="cfg-count">Departures</label>
      <input id="cfg-count" type="number" min="1" max="10" value="3" />
    </div>
    <div class="setting">
      <label for="cfg-refresh">Refresh</label>
      <input id="cfg-refresh" type="number" min="5" max="60" value="10" />
      <span class="unit">s</span>
    </div>
    <div class="setting">
      <label for="cfg-window">Window</label>
      <input id="cfg-window" type="number" min="5" max="60" value="10" />
      <span class="unit">min</span>
    </div>
  </div>

  <div class="search-box">
    <input id="search" type="text" placeholder="Search for a stop place..." autofocus />
  </div>
  <ul id="results"></ul>

  <div id="selected-info" class="selected-stop hidden">
    <div>
      <div class="stop-title"></div>
      <div class="stop-id-display"></div>
    </div>
    <div class="selected-stop-actions">
      <div id="refresh-indicator" class="hidden">
        <svg class="refresh-ring" viewBox="0 0 20 20" width="16" height="16">
          <circle cx="10" cy="10" r="8" class="refresh-ring-bg" />
          <circle cx="10" cy="10" r="8" class="refresh-ring-fg" />
        </svg>
      </div>
      <button id="clear-btn">Clear</button>
    </div>
  </div>

  <div id="mode-filters" class="hidden"></div>
  <div id="departures"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
