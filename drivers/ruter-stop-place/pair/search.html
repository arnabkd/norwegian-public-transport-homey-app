<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: transparent;
      color: #fff;
    }
    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: #0090ff;
    }
    input::placeholder {
      color: #888;
    }
    .results {
      margin-top: 12px;
    }
    .result-item {
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .result-item:hover {
      background: #222;
    }
    .result-name {
      font-weight: 600;
      font-size: 15px;
    }
    .result-detail {
      font-size: 13px;
      color: #aaa;
      margin-top: 2px;
    }
    .status {
      text-align: center;
      color: #888;
      margin-top: 24px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <input id="search" type="text" placeholder="Search for a stop place..." autofocus />
  <div id="results" class="results"></div>
  <div id="status" class="status">Type to search for a stop place</div>

  <script src="https://unpkg.com/homey/sdk/v3/pair/homey.js" data-homey-pair></script>
  <script>
    const searchInput = document.getElementById('search');
    const resultsDiv = document.getElementById('results');
    const statusDiv = document.getElementById('status');

    let debounceTimer = null;

    const MODE_ICONS = {
      bus: '\u{1F68C}',
      metro: '\u{1F687}',
      tram: '\u{1F68A}',
      rail: '\u{1F682}',
      water: '\u26F4\uFE0F',
      air: '\u2708\uFE0F',
      coach: '\u{1F68C}',
    };

    function categoryIcons(categories) {
      return categories
        .map(c => {
          const key = c.replace('onstreet', '').replace('Station', '').toLowerCase();
          return MODE_ICONS[key] || '';
        })
        .filter(Boolean)
        .join(' ');
    }

    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const query = searchInput.value.trim();
      if (query.length < 2) {
        resultsDiv.innerHTML = '';
        statusDiv.textContent = 'Type to search for a stop place';
        return;
      }
      statusDiv.textContent = 'Searching...';
      debounceTimer = setTimeout(() => {
        Homey.emit('search', query).then(renderResults).catch(err => {
          statusDiv.textContent = 'Search failed: ' + err.message;
        });
      }, 300);
    });

    function renderResults(stops) {
      resultsDiv.innerHTML = '';
      if (!stops || stops.length === 0) {
        statusDiv.textContent = 'No stop places found';
        return;
      }
      statusDiv.textContent = '';
      stops.forEach(stop => {
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML =
          '<div class="result-name">' + categoryIcons(stop.categories) + ' ' + stop.name + '</div>' +
          '<div class="result-detail">' + stop.locality + '</div>';
        div.addEventListener('click', () => selectStop(stop));
        resultsDiv.appendChild(div);
      });
    }

    function selectStop(stop) {
      Homey.createDevice({
        name: stop.name,
        data: { id: stop.id },
        store: { stopPlaceId: stop.id, stopPlaceName: stop.name },
      })
      .then(() => Homey.done())
      .catch(err => {
        statusDiv.textContent = 'Failed to create device: ' + err.message;
      });
    }
  </script>
</body>
</html>
